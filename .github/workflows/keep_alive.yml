# ══════════════════════════════════════════════════════════════
#  Structural Lab — Streamlit Keep-Alive Automation
#  Archivo : .github/workflows/keep_alive.yml
#  Autor   : DevOps Structural Lab
#  Disparo : Cron cada 14 min + ejecución manual
# ══════════════════════════════════════════════════════════════

name: 🏗️ Structural Lab — Keep Alive

on:
  # ── Ejecución automática cada 14 minutos ──────────────────
  # Nota: Streamlit duerme tras ~15 min de inactividad.
  # Usamos 14 min para tener margen de seguridad.
  # GitHub Actions acepta cron en UTC mínimo cada 5 min.
  schedule:
    - cron: "*/14 * * * *"

  # ── Ejecución manual desde la pestaña "Actions" de GitHub ──
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "Activar logs detallados (true/false)"
        required: false
        default: "false"

# ── Permisos mínimos necesarios ─────────────────────────────
permissions:
  contents: read

jobs:
  keep-alive:
    name: Despertar Apps Streamlit
    runs-on: ubuntu-latest
    timeout-minutes: 15   # límite de seguridad para el job

    steps:
      # ── 1. Checkout del repositorio ─────────────────────────
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      # ── 2. Configurar Python ─────────────────────────────────
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Instalar dependencias ─────────────────────────────
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # ── 4. Ejecutar script Keep-Alive ────────────────────────
      - name: 🚀 Ejecutar Keep-Alive
        run: python wake_up.py
        env:
          PYTHONUNBUFFERED: "1"   # fuerza logs en tiempo real en la consola de Actions

      # ── 5. Reporte de estado (siempre se ejecuta) ────────────
      - name: 📊 Reporte Final
        if: always()
        run: |
          echo "────────────────────────────────────────"
          echo "  Ciclo Keep-Alive completado"
          echo "  Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Job status: ${{ job.status }}"
          echo "────────────────────────────────────────"
