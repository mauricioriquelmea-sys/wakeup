# ══════════════════════════════════════════════════════════════
#  Structural Lab — Streamlit Keep-Alive (Playwright)
#  Archivo : .github/workflows/main.yml
#  Disparo : Cron cada 14 min + ejecución manual
# ══════════════════════════════════════════════════════════════

name: SL Keep Alive Bot

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Despertar Apps Streamlit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: Instalar Chromium headless
        run: python -m playwright install chromium --with-deps

      - name: Ejecutar script de despertar
        run: python wake_up.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Reporte Final
        if: always()
        run: |
          echo "────────────────────────────────────────"
          echo "  Ciclo completado: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Status: ${{ job.status }}"
          echo "────────────────────────────────────────"
