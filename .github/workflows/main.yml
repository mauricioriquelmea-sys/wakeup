name: Structural Lab Keep-Alive PRO

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  wake-up-browser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Despertar Apps con Navegador Real
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time

          # MODIFICA ESTA LISTA CON TUS URLS DE STREAMLIT (TERMINADAS EN .streamlit.app)
          apps = [
              'https://viento-nch432.streamlit.app/',
              'https://topgal-dvp.streamlit.app/',
              'https://silicona-estructural.streamlit.app/',
              'https://nieve-nch431.streamlit.app/',
              'https://sismo-nch3357.streamlit.app/',
              'https://mullion-design.streamlit.app/'
          ]

          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              for url in apps:
                  try:
                      page = browser.new_page()
                      print(f'Simulando visita de ingeniero en: {url}')
                      # Espera hasta 60s a que la app cargue y la red esté tranquila
                      page.goto(url, wait_until='networkidle', timeout=60000)
                      time.sleep(10) # Damos 10s extra para que el motor de Python despierte
                      print(f'✅ {url} está operativa.')
                      page.close()
                  except Exception as e:
                      print(f'⚠️ No se pudo cargar {url} (puede estar despertando): {e}')
              browser.close()
          "
